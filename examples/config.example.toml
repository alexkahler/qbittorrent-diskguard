# DiskGuard loads config from /config/config.toml inside the container.
# Recommended Docker mapping: /path/to/diskguard:/config
# On first run, DiskGuard auto-creates /config/config.toml if it is missing.

[qbittorrent]
# Base URL for qBittorrent Web API. Default: "http://qbittorrent:8080". Type: string.
url = "http://qbittorrent:8080"
# qBittorrent username used for API login. Default: none (required). Type: string.
username = "admin"
# qBittorrent password used for API login. Default: none (required). Type: string.
password = ""
# HTTP connect timeout for qBittorrent requests in seconds. Default: 2.0. Type: float.
connect_timeout_seconds = 2.0
# HTTP read timeout for qBittorrent requests in seconds. Default: 8.0. Type: float.
read_timeout_seconds = 8.0
# Total HTTP timeout for qBittorrent requests in seconds. Default: 12.0. Type: float.
total_timeout_seconds = 12.0

[disk]
# Advanced: Path inside DiskGuard container to the downloads filesystem to monitor. Default: "/downloads". Type: string.
watch_path = "/downloads"
# Enter SOFT mode when free disk percent drops below this threshold. Default: 10.0. Type: float.
soft_pause_below_pct = 10.0
# Enter HARD mode when free disk percent drops below this threshold. Default: 5.0. Type: float.
hard_pause_below_pct = 5.0
# Minimum free disk percent target for resume planning floor. Inrease this if you want torrents to resume when more space has been regained. Default: 10.0. Type: float.
resume_floor_pct = 10.0
# Extra reserve added to resume planning floor in gibibytes. Increase this if you often experience restarts hovering around the SOFT limit. Default: 10.0. Type: float.
safety_buffer_gb = 10.0
# Torrent states treated as downloading-ish for enforcement/projection. Default: ["downloading", "metaDL", "queuedDL", "stalledDL", "checkingDL", "allocating"]. Type: list[string].
downloading_states = ["downloading", "metaDL", "queuedDL", "stalledDL", "checkingDL", "allocating"]

[polling]
# Seconds between enforcement ticks. Incraese this to lessen the burden on qBittorrent, at the risk of slower response time. Default: 30. Type: int.
interval_seconds = 30
# Seconds between on-add quick poll attempts in SOFT/HARD. Change this to a higher number if you often experience timeouts. Default: 1.0. Type: float.
on_add_quick_poll_interval_seconds = 1.0
# Maximum on-add quick poll attempts per torrent hash in SOFT/HARD. Increase this if your qBittorrent is slow in getting metadata. Default: 10. Type: int.
on_add_quick_poll_max_attempts = 10
# Advanced: Maximum concurrent on-add quick poll tasks. Default: 32. Type: int.
on_add_quick_poll_max_concurrency = 32
# Advanced: Maximum queued/in-flight on-add quick poll tasks before returning HTTP 429. Default: 64. Type: int.
on_add_max_pending_tasks = 64

[resume]
# Resume candidate ordering policy. Default: "priority_fifo". Type: string enum (smallest_first|priority_fifo|largest_first).
policy = "priority_fifo"
# For priority_fifo policy, stop at first non-fitting candidate when true. Default: true. Type: bool.
strict_fifo = true

[tagging]
# Tag added to torrents paused by DiskGuard. Default: "diskguard_paused". Type: string.
paused_tag = "diskguard_paused"
# Tag granted to in-progress torrents allowed to keep downloading in SOFT mode. Default: "soft_allowed". Type: string.
soft_allowed_tag = "soft_allowed"

[logging]
# Application log level. Default: "INFO". Type: string enum (DEBUG|INFO|WARNING|ERROR).
level = "INFO"

[server]
# Advanced: HTTP bind address for DiskGuard API server. Default: "0.0.0.0". Type: string.
host = "0.0.0.0"
# HTTP listen port for DiskGuard API server. Default: 7070. Type: int.
port = 7070
# Required shared secret for POST /on-add header "X-DiskGuard-Token". Type: string.
on_add_auth_token = ""
# Advanced: Maximum accepted request body size in bytes for /on-add. Default: 8192. Type: int.
on_add_max_body_bytes = 8192
